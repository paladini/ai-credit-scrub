name: ai-credit-scrub
description: Fail pull requests that contain explicit AI-agent credit text.
inputs:
  github-token:
    description: GitHub token used to read the pull request title and body.
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        go install github.com/paladini/ai-credit-scrub/cmd/ai-credit-scrub@v1
        gh pr view "$GITHUB_REF_NAME" --json title,body --jq '.title + "\n" + .body' > /tmp/ai-credit-pr.txt
        ai-credit-scrub check /tmp/ai-credit-pr.txt
        git log --format=%B "${{ github.event.pull_request.base.sha }}..${{ github.sha }}" > /tmp/ai-credit-commits.txt
        ai-credit-scrub check /tmp/ai-credit-commits.txt
