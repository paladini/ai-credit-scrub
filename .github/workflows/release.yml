name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build archives
        run: |
          mkdir dist
          for target in linux/amd64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${target%/*}; GOARCH=${target#*/}; ext=""; [ "$GOOS" = windows ] && ext=.exe
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/ai-credit-scrub-${GOOS}-${GOARCH}${ext}" ./cmd/ai-credit-scrub
          done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
